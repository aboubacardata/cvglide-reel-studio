<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVGlide HD Reel Video Generator</title>
  <!-- Outfit Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #09090e;
      --bg-card: rgba(18, 18, 26, 0.75);
      --border-color: rgba(255, 255, 255, 0.08);
      --accent: #1D9E75;
      --accent-hover: #178260;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --iphone-bezel: #1b1b22;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(29, 158, 117, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(127, 119, 221, 0.08) 0px, transparent 50%);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      background: rgba(9, 9, 14, 0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-container { display: flex; align-items: center; gap: 12px; }
    .logo-container svg { width: 32px; height: 32px; }
    .logo-text { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #fff 30%, var(--accent) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-tag { font-size: 11px; background: rgba(29, 158, 117, 0.15); color: #3adea2; padding: 3px 8px; border-radius: 20px; border: 1px solid rgba(29, 158, 117, 0.2); font-weight: 500; }
    
    .dashboard {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 480px;
      gap: 40px;
      padding: 40px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    @media (max-width: 1100px) { .dashboard { grid-template-columns: 1fr; } }

    .preview-container {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border-radius: 24px;
      border: 1px solid var(--border-color);
      padding: 40px 20px;
      backdrop-filter: blur(20px);
      min-height: 900px;
    }

    /* True 9:16 aspect ratio preview container */
    .phone-frame {
      width: 450px;
      height: 800px;
      background: var(--iphone-bezel);
      border-radius: 48px;
      padding: 10px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 4px #2c2c35, 0 0 20px 2px rgba(29, 158, 117, 0.15);
      position: relative;
      overflow: hidden;
    }

    .phone-notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 20px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 10;
      pointer-events: none;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      background: #09090e;
      border-radius: 38px;
      overflow: hidden;
      position: relative;
    }

    .controls-container { display: flex; flex-direction: column; gap: 24px; }
    .panel { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border-color); padding: 24px; }
    .panel-title { font-size: 16px; font-weight: 600; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .panel-title svg { width: 18px; height: 18px; color: var(--accent); }

    /* Exporter / Recorder */
    .export-btn { padding: 14px 16px; border-radius: 12px; background: linear-gradient(135deg, #1D9E75 0%, #157c5c 100%); border: none; color: #fff; cursor: pointer; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; box-shadow: 0 4px 15px rgba(29, 158, 117, 0.25); transition: all 0.2s; }
    .export-btn:hover { background: linear-gradient(135deg, #22b687 0%, #1D9E75 100%); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(29, 158, 117, 0.35); }

    /* Timeline scrubbers */
    .timeline-widget { display: flex; flex-direction: column; gap: 12px; }
    .scrubber-row { display: flex; align-items: center; gap: 16px; }
    .play-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--accent); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .play-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
    .play-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .scrubber-slider { flex: 1; -webkit-appearance: none; appearance: none; height: 6px; border-radius: 3px; background: rgba(255, 255, 255, 0.12); cursor: pointer; }
    .scrubber-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; border: 2px solid var(--accent); cursor: pointer; }
    .time-label { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-muted); min-width: 48px; text-align: right; }

    /* Theme switchers */
    .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .theme-btn { padding: 12px; border-radius: 12px; background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border-color); color: var(--text-muted); cursor: pointer; font-size: 13px; font-weight: 600; text-align: center; transition: all 0.2s; }
    .theme-btn.active, .theme-btn:hover { background: rgba(29, 158, 117, 0.15); border-color: var(--accent); color: #3adea2; }

    /* Copy Options */
    .copy-option-card { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; position: relative; }
    .copy-option-card:hover { background: rgba(255, 255, 255, 0.04); }
    .copy-option-card.active { background: rgba(29, 158, 117, 0.05); border-color: var(--accent); }
    .copy-option-card.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent); }
    .copy-option-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .copy-option-name { font-weight: 600; font-size: 14px; }
    .copy-option-badge { font-size: 10px; background: rgba(255, 255, 255, 0.1); padding: 2px 6px; border-radius: 4px; color: var(--text-muted); }
    .copy-option-card.active .copy-option-badge { background: rgba(29, 158, 117, 0.2); color: #3adea2; }
    .copy-option-preview { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

    /* Recording Overlay */
    #recordingOverlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(9, 9, 14, 0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .recording-spinner { width: 50px; height: 50px; border: 4px solid rgba(29, 158, 117, 0.2); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>

    const animMatureKeywordBlock2 = document.getElementById('matureKeywordBlock2');
    const animMatureKeywordBlock3 = document.getElementById('matureKeywordBlock3');

    function buildCopyCards() {
      const container = document.getElementById('copyOptionsContainer');
      container.innerHTML = '';
      
      Object.keys(COPY_OPTIONS).forEach(key => {
        const option = COPY_OPTIONS[key];
        const isActive = key === state.activeCopy;

        card.innerHTML = `

        `;
        container.appendChild(card);
      });
    }

    function adjustTextSize(el, defaultSize) {
      el.setAttribute('font-size', defaultSize);
      try {
        let length = el.getComputedTextLength();
        if (length === 0) {
          const text = el.textContent || "";
          length = text.length * defaultSize * 0.55;
        }
        let size = defaultSize;
        while (length > 390 && size > 14) {
          size -= 1;
          el.setAttribute('font-size', size);
          length = el.getComputedTextLength();
          if (length === 0) {
            const text = el.textContent || "";
            length = text.length * size * 0.55;
          }
        }
      } catch (e) {}
    }

    function applyCopy(key) {
      const option = COPY_OPTIONS[key];
      txtTopLine1.textContent = option.topLine1;
      txtTopLine2.textContent = option.topLine2;
      txtBottomLine1.textContent = option.bottomLine1;
      txtBottomLine2.textContent = option.bottomLine2;
      txtProp1Title.textContent = option.prop1Title;
      txtProp1Desc.textContent = option.prop1Desc;
      txtProp2Title.textContent = option.prop2Title;
      txtProp2Desc.textContent = option.prop2Desc;
      txtCta.textContent = option.cta;

      // Dynamically auto-fit visual sizes to ensure 0% clipping on all devices
      adjustTextSize(txtTopLine1, 24);
      adjustTextSize(txtTopLine2, 30);
      adjustTextSize(txtBottomLine1, 30);
      adjustTextSize(txtBottomLine2, 24);
      adjustTextSize(txtProp1Title, 26);
      adjustTextSize(txtProp2Title, 26);
    }

    function setCopy(key) {
      state.activeCopy = key;
      buildCopyCards();
      applyCopy(key);
    }

    function setTheme(theme) {
      state.theme = theme;
      document.getElementById('theme-playful').className = `theme-btn ${theme === 'playful' ? 'active' : ''}`;
      document.getElementById('theme-mature').className = `theme-btn ${theme === 'mature' ? 'active' : ''}`;
      
      const playfulProb = document.getElementById('playfulThemeProblemGroup');
      const playfulSol = document.getElementById('playfulThemeSolutionGroup');
      const matureProb = document.getElementById('matureThemeProblemGroup');
      const matureSol = document.getElementById('matureThemeSolutionGroup');
      
      if (theme === 'playful') {
        playfulProb.style.display = 'block';
        playfulSol.style.display = 'block';
        matureProb.style.display = 'none';
        matureSol.style.display = 'none';
      } else {
        playfulProb.style.display = 'none';
        playfulSol.style.display = 'none';
        matureProb.style.display = 'block';
        matureSol.style.display = 'block';
      }
    }

    function togglePlay() {
      state.isPlaying = !state.isPlaying;
      if (state.isPlaying) {
        playIconSvg.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        state.lastFrameTime = performance.now();
        requestAnimationFrame(loop);
      } else {
        playIconSvg.innerHTML = '<polygon points="8,5 19,12 8,19" />';
      }
    }

    function scrubTimeline(val) {
      state.t = (val / 1000) * state.duration;
      timeLabel.textContent = (state.t / 1000).toFixed(1) + 's';
      updateSvgAnimations();
      updateCinematicTimeline();
    }

    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

    function updateSvgAnimations() {
      const t = state.t;
      
      // Playful
      const beltOffset = (t / 400) % 1 * 14;
      animRunningBeltLine.setAttribute('stroke-dashoffset', beltOffset);
      const bobY = Math.sin((t / 250) * Math.PI * 2) * -3 - 3;
      animStickmanSadHead.setAttribute('transform', `translate(0, ${bobY})`);
      animStickmanSadBody.setAttribute('transform', `translate(0, ${bobY})`);
      const swingAngle = Math.sin((t / 250) * Math.PI * 2) * 22.5;
      animLegLeftGroup.setAttribute('transform', `rotate(${swingAngle}, 258, 196)`);
      animLegRightGroup.setAttribute('transform', `rotate(${-swingAngle}, 258, 196)`);
      animArmLeft.setAttribute('transform', `rotate(${-swingAngle * 0.8}, 258, 158)`);
      animArmRight.setAttribute('transform', `rotate(${swingAngle * 0.8}, 258, 158)`);
      
      const scooterY = Math.sin((t / 800) * Math.PI * 2) * -3 - 3;
      animScooterSceneGroup.setAttribute('transform', `translate(0, ${scooterY})`);
      const wheelRotate = (t / 300) * 360 % 360;
      animWheelRear.setAttribute('transform', `rotate(${wheelRotate}, 210, 525)`);
      animWheelFront.setAttribute('transform', `rotate(${wheelRotate}, 300, 525)`);

      // Mature
      const scanFrac = (t / 2500) % 1;
      const scanY = scanFrac * 115;
      const scanOpacity = scanFrac < 0.1 ? scanFrac / 0.1 : (scanFrac > 0.9 ? (1 - scanFrac) / 0.1 : 1);
      animRadarLineRedGroup.setAttribute('transform', `translate(0, ${scanY})`);
      animRadarLineRedGroup.setAttribute('opacity', scanOpacity);
      animRadarLineGreenGroup.setAttribute('transform', `translate(0, ${scanY})`);
      animRadarLineGreenGroup.setAttribute('opacity', scanOpacity);

      const shimVal1 = 0.3 + Math.sin((t / 1800) * Math.PI * 2) * 0.5;
      const shimVal2 = 0.3 + Math.sin(((t + 400) / 1800) * Math.PI * 2) * 0.5;
      const shimVal3 = 0.3 + Math.sin(((t + 800) / 1800) * Math.PI * 2) * 0.5;
      animMatureKeywordBlock1.style.fillOpacity = Math.max(0.2, Math.min(1, shimVal1));
      animMatureKeywordBlock2.style.fillOpacity = Math.max(0.2, Math.min(1, shimVal2));
      animMatureKeywordBlock3.style.fillOpacity = Math.max(0.2, Math.min(1, shimVal3));

      const floatCycle = t % 5000;
      let c1Y = 0, c1Scale = 1, c1Opacity = 0;
      if (floatCycle < 2500) {
        const c1Frac = floatCycle / 2500;
        if (c1Frac < 0.15) {
          const inFrac = c1Frac / 0.15; c1Y = lerp(15, 0, easeInOutQuad(inFrac)); c1Scale = lerp(0.95, 1, easeInOutQuad(inFrac)); c1Opacity = inFrac;
        } else if (c1Frac > 0.85) {
          const outFrac = (c1Frac - 0.85) / 0.15; c1Y = lerp(0, -10, easeInOutQuad(outFrac)); c1Scale = lerp(1, 0.95, easeInOutQuad(outFrac)); c1Opacity = 1 - outFrac;
        } else { c1Y = 0; c1Scale = 1; c1Opacity = 1; }
      }
      animMatureNotifyCard1.setAttribute('transform', `translate(0, ${c1Y}) scale(${c1Scale})`);
      animMatureNotifyCard1.style.transformOrigin = "119px 445px";
      animMatureNotifyCard1.setAttribute('opacity', c1Opacity);

      let c2Y = 0, c2Scale = 1, c2Opacity = 0;
      if (floatCycle >= 2500) {
        const c2Frac = (floatCycle - 2500) / 2500;
        if (c2Frac < 0.15) {
          const inFrac = c2Frac / 0.15; c2Y = lerp(15, 0, easeInOutQuad(inFrac)); c2Scale = lerp(0.95, 1, easeInOutQuad(inFrac)); c2Opacity = inFrac;
        } else if (c2Frac > 0.85) {
          const outFrac = (c2Frac - 0.85) / 0.15; c2Y = lerp(0, -10, easeInOutQuad(outFrac)); c2Scale = lerp(1, 0.95, easeInOutQuad(outFrac)); c2Opacity = 1 - outFrac;
        } else { c2Y = 0; c2Scale = 1; c2Opacity = 1; }
      }
      animMatureNotifyCard2.setAttribute('transform', `translate(0, ${c2Y}) scale(${c2Scale})`);
      animMatureNotifyCard2.style.transformOrigin = "119px 499px";
      animMatureNotifyCard2.setAttribute('opacity', c2Opacity);
    }

    // New 3-screen cinematic sequencer panning logic
    function updateCinematicTimeline() {
      const p = state.t / state.duration; // 0 to 1
      let translateY = 0;

      if (p < 0.25) {
        translateY = 0; // Screen 1 (Problem) - 3.0s
      } else if (p >= 0.25 && p < 0.33) {
        translateY = lerp(0, -800, easeInOutQuad((p - 0.25) / 0.08)); // Scroll to Screen 2 - 1.0s
      } else if (p >= 0.33 && p < 0.58) {
        translateY = -800; // Screen 2 (Solution) - 3.0s
      } else if (p >= 0.58 && p < 0.66) {
        translateY = lerp(-800, -1600, easeInOutQuad((p - 0.58) / 0.08)); // Scroll to Screen 3 - 1.0s
      } else {
        translateY = -1600; // Screen 3 (CTA & Value Props) - 4.0s (Linger!)
      }

      slidesGroup.setAttribute('transform', `translate(0, ${translateY})`);
    }

    // True HD Video Recording logic
    function recordVideo() {
      if (state.isRecording) return;
      
      const wasPlaying = state.isPlaying;
      state.isPlaying = false;
      state.isRecording = true;
      
      const overlay = document.getElementById('recordingOverlay');
      const progress = document.getElementById('recordingProgress');
      const statusText = document.getElementById('recordingStatus');
      overlay.style.display = 'flex';
      
      // Native Reel dimensions
      const captureCanvas = document.createElement('canvas');
      captureCanvas.width = 1080;
      captureCanvas.height = 1920;
      const ctx = captureCanvas.getContext('2d');
      
      const stream = captureCanvas.captureStream(30);
      let mimeType = 'video/webm;codecs=vp9';
      if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
      
      const chunks = [];
      let recorder;
      try { recorder = new MediaRecorder(stream, { mimeType: mimeType }); } 
      catch (e) { recorder = new MediaRecorder(stream); }
      
      recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = () => {
        const videoBlob = new Blob(chunks, { type: 'video/webm' });
        const videoURL = window.URL.createObjectURL(videoBlob);
        const dlLink = document.createElement('a');
        dlLink.href = videoURL;
        dlLink.download = `cvglide_HD_reel_${state.theme}.webm`;
        document.body.appendChild(dlLink);
        dlLink.click();
        document.body.removeChild(dlLink);
        window.URL.revokeObjectURL(videoURL);
        
        overlay.style.display = 'none';
        state.isRecording = false;
        if (wasPlaying) togglePlay();
      };
      
      const totalFrames = 360; // 12s at 30 FPS (Extended to allow CTA linger!)
      let currentFrame = 0;
      recorder.start();
      
      function renderNextFrame() {
        if (currentFrame >= totalFrames) { recorder.stop(); return; }
        
        state.t = (currentFrame / totalFrames) * state.duration;
        updateSvgAnimations();
        updateCinematicTimeline();
        
        // Force SVG to rasterize at pure 1080x1920 for tack-sharp recording!
        svgEl.setAttribute('width', '1080');
        svgEl.setAttribute('height', '1920');
        
        const serializer = new XMLSerializer();
        const svgString = serializer.serializeToString(svgEl);
        
        svgEl.setAttribute('width', '100%');
        svgEl.setAttribute('height', '100%');
        
        const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
        const URL = window.URL || window.webkitURL || window;
        const blobURL = URL.createObjectURL(svgBlob);
        
        const frameImg = new Image();
        frameImg.onload = function() {
          ctx.fillStyle = '#09090E';
          ctx.fillRect(0, 0, 1080, 1920);
          ctx.drawImage(frameImg, 0, 0, 1080, 1920);
          URL.revokeObjectURL(blobURL);
          
          currentFrame++;
          const pct = Math.round((currentFrame / totalFrames) * 100);
          progress.style.width = pct + '%';
          statusText.textContent = `${pct}% completed (${currentFrame}/${totalFrames} frames)`;
          
          setTimeout(renderNextFrame, 16);
        };
        frameImg.src = blobURL;
      }
      setTimeout(renderNextFrame, 500);
    }

    function loop(timestamp) {
      if (!state.isPlaying) return;
      if (!state.lastFrameTime) state.lastFrameTime = timestamp;
      const delta = timestamp - state.lastFrameTime;
      state.lastFrameTime = timestamp;
      
      state.t += delta * state.speed;
      if (state.t >= state.duration) state.t = 0;
      
      const progressRatio = state.t / state.duration;
      timelineScrubber.value = Math.round(progressRatio * 1000);
      timeLabel.textContent = (state.t / 1000).toFixed(1) + 's';
      
      updateSvgAnimations();
      updateCinematicTimeline();
      
      requestAnimationFrame(loop);
    }

    buildCopyCards();
    applyCopy('option1'); // Auto-load best copy
    setTheme('mature'); // Auto-load mature theme based on user preference
    
    state.lastFrameTime = performance.now();
    requestAnimationFrame(loop);
  </script>
</body>
